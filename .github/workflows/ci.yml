name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly, Monday 12:00 UTC. Catches upstream WCAG spec drift: the
    # build-reference job rebuilds from the live W3C source and re-validates.
    - cron: "0 12 * * 1"

permissions:
  contents: read

jobs:
  lint-and-validate:
    name: Lint and validate
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v7.0.0
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      # actions/setup-node v6.4.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "20"

      - name: Lint markdown
        run: npx --yes markdownlint-cli@0.45.0 "**/*.md" --ignore-path .markdownlintignore

      - name: Validate committed reference and skill consistency
        run: node scripts/validate.mjs

  build-reference:
    name: Build reference from live W3C source
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v7.0.0
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      # actions/setup-node v6.4.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "20"

      - name: Shellcheck build script
        run: shellcheck scripts/build-reference.sh

      # Pin pandoc to the version the committed reference was authored with, so
      # regeneration is byte-reproducible. Distro apt pandoc floats by release
      # (Ubuntu noble ships 3.1.3) and its Markdown output differs cosmetically
      # from 3.10, which would produce false drift warnings.
      - name: Install pinned pandoc 3.10
        run: |
          curl -sSL -o /tmp/pandoc.tar.gz \
            https://github.com/jgm/pandoc/releases/download/3.10/pandoc-3.10-linux-amd64.tar.gz
          echo "e0f8af62d0f267d22baa5bcefe6d5dda3a097ccc60de794b759fe03159923244  /tmp/pandoc.tar.gz" | sha256sum -c -
          tar xzf /tmp/pandoc.tar.gz -C /tmp
          echo "/tmp/pandoc-3.10/bin" >> "$GITHUB_PATH"

      - name: Regenerate reference from live W3C source
        run: ./scripts/build-reference.sh

      - name: Validate regenerated reference
        run: node scripts/validate.mjs

      - name: Report drift from committed reference
        run: |
          if ! git diff --quiet -- references/wcag-2.2-full.md; then
            echo "::warning::Regenerated reference differs from the committed copy. Upstream WCAG spec may have changed; review the diff and commit if intended."
            git --no-pager diff --stat -- references/wcag-2.2-full.md
          else
            echo "Regenerated reference is identical to the committed copy."
          fi
